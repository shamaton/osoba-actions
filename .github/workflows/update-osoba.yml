name: Update

on:
  schedule:
    # 17:06, 17:36, ..., 23:06, 23:36 JST
    - cron: "6,36 8-14 * * *"
  workflow_dispatch:
    inputs:
      ranking_date:
        description: "Ranking date in JST as YYYYMMDD. Defaults to today in JST."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: update-osoba-ranking-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-ranking:
    runs-on: ubuntu-latest

    env:
      SUBMODULE_PATH: osoba
      SUBMODULE_BRANCH: main
      TZ: Asia/Tokyo

    steps:
      - name: Checkout parent repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Ensure OSOBA_REPO_PAT is configured
        env:
          OSOBA_TOKEN: ${{ secrets.OSOBA_REPO_PAT }}
        run: |
          if [ -z "$OSOBA_TOKEN" ]; then
            echo "OSOBA_REPO_PAT is not configured."
            exit 1
          fi

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Checkout osoba submodule with PAT
        env:
          OSOBA_TOKEN: ${{ secrets.OSOBA_REPO_PAT }}
        run: |
          git submodule sync -- "$SUBMODULE_PATH"
          git config "submodule.${SUBMODULE_PATH}.url" "https://x-access-token:${OSOBA_TOKEN}@github.com/shamaton/osoba.git"
          git submodule update --init -- "$SUBMODULE_PATH"

          git -C "$SUBMODULE_PATH" remote set-url origin "https://x-access-token:${OSOBA_TOKEN}@github.com/shamaton/osoba.git"
          git -C "$SUBMODULE_PATH" fetch origin "$SUBMODULE_BRANCH"
          git -C "$SUBMODULE_PATH" checkout "$SUBMODULE_BRANCH"
          git -C "$SUBMODULE_PATH" pull --ff-only origin "$SUBMODULE_BRANCH"

      - name: Resolve ranking path
        id: ranking
        env:
          INPUT_RANKING_DATE: ${{ inputs.ranking_date }}
        run: |
          ranking_date="$INPUT_RANKING_DATE"
          if [ -z "$ranking_date" ]; then
            ranking_date="$(date +'%Y%m%d')"
          fi

          if ! printf '%s' "$ranking_date" | grep -Eq '^[0-9]{8}$'; then
            echo "ranking_date must be YYYYMMDD: $ranking_date"
            exit 1
          fi

          ranking_year="${ranking_date%????}"
          ranking_month="${ranking_date#????}"
          ranking_month="${ranking_month%??}"
          ranking_path="ranking/${ranking_year}/${ranking_month}/${ranking_date}.csv"

          echo "date=$ranking_date" >> "$GITHUB_OUTPUT"
          echo "path=$ranking_path" >> "$GITHUB_OUTPUT"
          echo "full_path=${SUBMODULE_PATH}/${ranking_path}" >> "$GITHUB_OUTPUT"

      - name: Skip when ranking CSV already exists
        id: existing_ranking
        run: |
          ranking_path="${{ steps.ranking.outputs.path }}"
          if [ -s "${SUBMODULE_PATH}/${ranking_path}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Ranking CSV already exists: ${SUBMODULE_PATH}/${ranking_path}"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        if: steps.existing_ranking.outputs.skip != 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.SUBMODULE_PATH }}/go.mod
          cache: false

      - name: Generate ranking CSV
        if: steps.existing_ranking.outputs.skip != 'true'
        run: |
          go -C "$SUBMODULE_PATH" run ./cmd/ranking \
            -output-dir ranking

      - name: Commit and push osoba ranking CSV
        if: steps.existing_ranking.outputs.skip != 'true'
        id: osoba_commit
        run: |
          git -C "$SUBMODULE_PATH" add ranking

          if git -C "$SUBMODULE_PATH" diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No ranking CSV changes in $SUBMODULE_PATH."
            exit 0
          fi

          changed_file="$(git -C "$SUBMODULE_PATH" diff --cached --name-only -- ranking | head -n 1)"
          ranking_date="$(basename "$changed_file" .csv)"

          if ! printf '%s' "$ranking_date" | grep -Eq '^[0-9]{8}$'; then
            echo "Unexpected ranking CSV path: $changed_file"
            exit 1
          fi

          git -C "$SUBMODULE_PATH" commit -m "chore: update ranking CSV ${ranking_date}"
          git -C "$SUBMODULE_PATH" push origin "HEAD:$SUBMODULE_BRANCH"

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit updated submodule pointer
        if: steps.existing_ranking.outputs.skip == 'true' || steps.osoba_commit.outputs.changed != ''
        run: |
          git add "$SUBMODULE_PATH"

          if git diff --cached --quiet; then
            echo "No parent repository changes."
            exit 0
          fi

          git commit -m "chore: update osoba submodule pointer"
          git push origin HEAD
